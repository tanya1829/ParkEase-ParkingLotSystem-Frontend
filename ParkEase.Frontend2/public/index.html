<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffc107" />
    <meta name="description" content="ParkEase - Smart Parking Lot Management System" />
    <title>ParkEase — Smart Parking</title>

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />

    <!-- Razorpay Checkout -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
      /* Initial loading screen */
      #initial-loader {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #212529;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #initial-loader h1 {
        color: #ffc107;
        font-size: 2.5rem;
        font-weight: 800;
        margin-top: 16px;
        letter-spacing: 2px;
      }
      #initial-loader p {
        color: #adb5bd;
        font-size: 1rem;
      }
      .loader-spinner {
        width: 48px;
        height: 48px;
        border: 5px solid #ffc107;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>

    <!-- Initial Loading Screen (hidden once React loads) -->
    <div id="initial-loader">
      <div class="loader-spinner"></div>
      <h1>🅿 ParkEase</h1>
      <p>Find. Reserve. Park. Effortlessly.</p>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <script>
      // Hide loader once React has mounted
      window.addEventListener('load', function () {
        setTimeout(function () {
          var loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(function () { loader.style.display = 'none'; }, 300);
          }
        }, 500);
      });
    </script>

  </body>
</html>
